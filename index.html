<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gen 3 Pokemon Builder</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="teamwrapper">
      <div class="pad">
        <button name="back" class="button" type="button">‹ Team</button>
        <strong class="builder-title">AI Gen 3 OU Teambuilder</strong>
        <span class="spacer"></span>
        <div class="mode-control" role="tablist" aria-label="Builder mode">
          <button class="button active" type="button" data-mode="complete" role="tab" aria-selected="true">
            Complete
          </button>
          <button class="button" type="button" data-mode="generate" role="tab" aria-selected="false">
            Generate
          </button>
        </div>
        <button class="button primary" id="runButton" type="button">Complete Team</button>
      </div>

      <div class="teambar" id="teambar" aria-label="Team slots"></div>

      <div class="builder-grid">
        <div class="team-main">
          <div class="toolbar">
            <div>
              <h2 id="modeTitle">Mask Fill</h2>
              <p id="modeSubtitle">Empty team slots are treated as masked positions.</p>
            </div>
            <div class="toolbar-actions">
              <button class="button" id="sampleButton" type="button">Sample</button>
              <button class="button" id="clearButton" type="button">Clear</button>
            </div>
          </div>

          <div class="teamchartbox individual">
            <ol class="teamchart" id="teamChart"></ol>
          </div>
        </div>

        <aside class="side-column" aria-label="Results and import export">
          <div class="teambuilder-results settings-results">
            <ul class="utilichart">
              <li class="result result-heading">
                <h3>Connection</h3>
                <span class="status-chip demo" id="connectionState">Demo</span>
              </li>
              <li class="result form-result">
                <label>Backend URL</label>
                <input id="backendUrl" type="url" class="textbox" autocomplete="off" />
              </li>
              <li class="result form-result">
                <label>API Key</label>
                <input id="apiKey" type="password" class="textbox" placeholder="x-api-key" autocomplete="off" />
              </li>
              <li class="result two-fields">
                <label>
                  Candidates
                  <input id="numCandidates" type="number" min="1" max="20" value="10" class="textbox" />
                </label>
                <label>
                  Samples
                  <input id="numSamples" type="number" min="1" max="512" value="64" class="textbox" />
                </label>
              </li>
            </ul>
          </div>

          <div class="teambuilder-pokemon-import">
            <div class="pokemonedit-buttons">
              <button id="importButton" class="button" type="button">‹ Import</button>
              <button id="exportButton" class="button" type="button">Export</button>
            </div>
            <textarea
              id="showdownText"
              class="pokemonedit textbox"
              rows="14"
              spellcheck="false"
              placeholder="Tyranitar @ Leftovers&#10;Ability: Sand Stream&#10;Adamant Nature&#10;- Rock Slide&#10;- Earthquake"
            ></textarea>
          </div>

          <div class="teambuilder-results model-results" aria-live="polite">
            <ul class="utilichart" id="candidateList">
              <li class="result result-heading">
                <h3>Model Results</h3>
                <span class="status-chip" id="resultCount">0 candidates</span>
              </li>
              <li class="result message-result" id="messageCard">Add a partial team or generate from scratch.</li>
            </ul>
          </div>
        </aside>
      </div>
    </main>

    <datalist id="speciesList"></datalist>
    <datalist id="itemList"></datalist>
    <datalist id="abilityList"></datalist>
    <datalist id="moveList"></datalist>

    <script src="./app.js" type="module"></script>
  </body>
</html>
